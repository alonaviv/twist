{% load static %}

<!DOCTYPE html>
<html lang="he" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex, nofollow" />

        <title>הסיבוב עדיין לא מוכן – Broadway With a Twist חידון פאב</title>

        <script src="https://kit.fontawesome.com/4078bed46b.js" crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap">
        <link rel="stylesheet" href="{% static 'pub_quiz/css/main.css' %}">
    </head>

    <body>
        <main class="pq-page">
            <header class="pq-hero">
                <h1 class="pq-title">
                    <span class="pq-title-line pq-title-line--he">ברוכים הבאים לפאב קוויז של</span>
                    <span class="pq-title-line pq-title-line--en" dir="ltr" lang="en">Broadway With a Twist</span>
                </h1>
                <div class="pq-logo-wrapper">
                    <img src="{% static 'pub_quiz/img/pub_quiz_logo.png' %}"
                         alt="Broadway With a Twist חידון פאב"
                         class="pq-logo">
                </div>
                <p class="pq-no-link-message">
                    לי שכח להוסיף את הקישור לסיבוב {{ round_number|default:"?" }}! מוזמנים לצעוק עליו :)
                </p>
                <a href="{% url 'pub_quiz:home' %}" class="pq-round-btn pq-back-btn">חזרה לסיבובים</a>
            </header>
        </main>
    </body>
</html>
